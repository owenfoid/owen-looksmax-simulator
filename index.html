<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owen Looksmax Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg: #111113;
  --panel: #1a1a1f;
  --border: #2a2a30;
  --accent: #ff5c35;
  --accent2: #ff9f1c;
  --text: #e0e0e0;
  --dim: #666;
  --muted: #444;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { overflow-x:hidden; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  user-select: none;
}

/* === EFFECTS === */
.shake-1{animation:shake1 .12s linear}
.shake-2{animation:shake2 .18s linear}
.shake-3{animation:shake3 .25s linear}
@keyframes shake1{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,-1px)}}
@keyframes shake2{0%,100%{transform:translate(0)}20%{transform:translate(-6px,4px)}40%{transform:translate(5px,-5px)}60%{transform:translate(-4px,3px)}80%{transform:translate(6px,-2px)}}
@keyframes shake3{0%,100%{transform:translate(0)}10%{transform:translate(-10px,6px)}30%{transform:translate(8px,-8px)}50%{transform:translate(-12px,4px)}70%{transform:translate(10px,-6px)}90%{transform:translate(-6px,8px)}}

#flash{position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;transition:opacity 0.05s}
#flash.fire{opacity:1}
#chroma-wrap{filter:none}
#chroma-wrap.aberr{animation:chroma .2s ease-out}
@keyframes chroma{0%{filter:drop-shadow(-3px 0 rgba(255,92,53,.4)) drop-shadow(3px 0 rgba(100,200,255,.4))}100%{filter:none}}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);opacity:0.4}
.wobble{animation:wobble .3s ease-out}
@keyframes wobble{0%{transform:scale(1)}25%{transform:scale(1.04,0.96)}50%{transform:scale(0.96,1.04)}75%{transform:scale(1.02,0.98)}100%{transform:scale(1)}}

/* === LAYOUT === */
header { text-align:center; padding:18px 12px 4px; }
header h1 {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  color: var(--text);
  letter-spacing: -0.5px;
}
header h1 span { color:var(--accent); }
.sub {
  font-size: .65rem;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 400;
}

.game {
  max-width:860px; margin:0 auto; padding:8px;
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
}
@media(max-width:640px){ .game{grid-template-columns:1fr} }
.full { grid-column:1/-1; }

.p {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
}
.pt {
  font-size: .7rem;
  font-weight: 600;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}

/* === STATS === */
.stats { display:flex; justify-content:center; gap:28px; flex-wrap:wrap; text-align:center; padding:6px; }
.st .v {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1.6rem;
  color: var(--accent);
  line-height: 1;
}
.st .l {
  font-size: .55rem; color:var(--muted);
  letter-spacing: 1.5px; text-transform:uppercase;
}

/* === PSL BAR === */
.psl-row { display:flex; justify-content:space-between; font-size:.6rem; color:var(--dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.psl-bar {
  height:16px; background:#141416; border-radius:8px; overflow:hidden;
  border:1px solid var(--border); position:relative;
}
.psl-fill {
  height:100%; border-radius:8px; transition:width .4s;
  background: linear-gradient(90deg, var(--accent), var(--accent2), #4ade80);
}
.psl-inner {
  position:absolute; right:6px; top:50%; transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace; font-size:.7rem; font-weight:700;
  color:#000;
}
.rank {
  text-align:center; font-weight:800;
  font-size:1rem; margin-top:4px; letter-spacing:1px;
}

/* === STIM === */
.stim-wrap{margin-top:8px}
.stim-label{font-size:.55rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;display:flex;justify-content:space-between}
.stim-bar{height:6px;background:#141416;border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.stim-fill{height:100%;border-radius:3px;transition:width .15s;background:linear-gradient(90deg,var(--accent),#ff2a6d,#c084fc)}
.stim-fill.maxed{animation:stimPulse .3s infinite alternate}
@keyframes stimPulse{0%{opacity:.7}100%{opacity:1;box-shadow:0 0 10px var(--accent)}}

/* === CLICKER AREA === */
.click-area {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:300px; position:relative; cursor:pointer;
}
.click-area:active { opacity:.9; }
#face { image-rendering:auto; }
.click-hint {
  font-size: .6rem; color:var(--muted); margin-top:6px;
  letter-spacing:2px; text-transform:uppercase;
}

/* === FLOAT TEXT === */
.ft {
  position:fixed; pointer-events:none; z-index:200;
  font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1.4rem;
  text-shadow:0 0 8px currentColor;
  animation:ftUp .6s ease-out forwards;
}
@keyframes ftUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3) rotate(var(--r,3deg))}}

/* === PARTICLES === */
.particle{position:fixed;pointer-events:none;z-index:150;border-radius:50%;animation:particleOut var(--dur,.5s) ease-out forwards}
@keyframes particleOut{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx,20px),var(--dy,-40px)) scale(0)}}

/* === UPGRADES === */
.ul { display:flex; flex-direction:column; gap:4px; max-height:420px; overflow-y:auto; }
.ul::-webkit-scrollbar{width:3px} .ul::-webkit-scrollbar-thumb{background:var(--muted);border-radius:2px}
.ug {
  display:flex; align-items:center; gap:8px; padding:7px 10px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);
  border-radius:4px;
  cursor:pointer; transition:all .15s;
}
.ug:hover { background:rgba(255,92,53,0.06); border-color:var(--accent); }
.ug.lk { opacity:.2; cursor:not-allowed; }
.ug.lk:hover { background:transparent; border-color:var(--border); }
.ug .ic { font-size:1.1rem; width:24px; text-align:center; flex-shrink:0; }
.ug .inf { flex:1; min-width:0; }
.ug .nm { font-size:.7rem; font-weight:600; color:var(--text); }
.ug .ds { font-size:.5rem; color:var(--muted); }
.ug .rt { text-align:right; flex-shrink:0; }
.ug .co { font-family:'JetBrains Mono',monospace; font-size:.7rem; font-weight:700; color:var(--accent2); }
.ug .ow { font-size:.5rem; color:var(--accent); }

/* === ACHIEVEMENTS === */
.ag { display:flex; flex-wrap:wrap; gap:4px; }
.ac {
  width:30px; height:30px;
  background:rgba(255,255,255,0.03); border:1px solid var(--border);
  border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:.8rem; opacity:.15; transition:all .3s; position:relative;
}
.ac.un { opacity:1; border-color:var(--accent); background:rgba(255,92,53,0.08); }
.ac .tt{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);padding:3px 8px;border-radius:4px;font-size:.5rem;color:var(--text);white-space:nowrap;z-index:10}
.ac:hover .tt{display:block}

/* === LOG === */
.log{max-height:50px;overflow-y:auto;font-size:.55rem;color:var(--muted);padding:4px}
.log::-webkit-scrollbar{width:2px} .log::-webkit-scrollbar-thumb{background:var(--muted)}
.log span{display:block;line-height:1.5} .log .hl{color:var(--accent)}

/* === TOAST === */
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--panel);border:1px solid var(--accent);padding:8px 18px;border-radius:6px;font-size:.7rem;color:var(--accent);z-index:300;transition:transform .3s ease;pointer-events:none;text-align:center;max-width:90vw;font-weight:600}
.toast.show{transform:translateX(-50%) translateY(0)}

/* === COMBO === */
.combo-display {
  font-family:'JetBrains Mono',monospace; font-weight:700;
  font-size:1.2rem; letter-spacing:1px;
  text-align:center; color:var(--accent);
  animation:comboPulse .3s infinite alternate;
}
@keyframes comboPulse{0%{transform:scale(1)}100%{transform:scale(1.05)}}

/* === PRESTIGE === */
.prestige-btn {
  text-align:center; padding:8px; margin-bottom:6px;
  background:rgba(192,132,252,0.06);
  border:1px solid rgba(192,132,252,0.25); border-radius:4px;
  font-size:.65rem; font-weight:600; color:#c084fc;
  cursor:pointer; transition:all .2s;
}
.prestige-btn:hover { background:rgba(192,132,252,0.12); border-color:#c084fc; }
.prestige-btn.lk { opacity:.3; cursor:not-allowed; }
.prestige-btn.lk:hover { background:rgba(192,132,252,0.06); }
.prestige-info { font-size:.55rem; color:#c084fc; text-align:center; margin-top:4px; }

/* === GOLDEN === */
.golden-indicator {
  font-weight:700; font-size:.8rem;
  color:var(--accent2); text-align:center;
  animation:goldenPulse .4s infinite alternate;
}
@keyframes goldenPulse{0%{opacity:.7;transform:scale(1)}100%{opacity:1;transform:scale(1.06)}}

/* === MIC === */
.mic-btn {
  margin-top:6px; padding:4px 12px; border:1px solid var(--accent);
  border-radius:4px; background:transparent; color:var(--accent);
  font-family:inherit; font-size:.55rem; cursor:pointer; transition:all .2s;
}
.mic-btn:hover { background:var(--accent); color:#000; }

footer{text-align:center;font-size:.5rem;color:#333;padding:10px}
</style>
</head>

// ============ STATE ============
let S = { pts:0, total:0, pc:1, ps:0, upg:{}, ach:{}, clicks:0, stim:0,
  prestige:0, combo:0, maxCombo:0, lastClickTime:0, goldenClicks:0,
  lastSaveTime:Date.now(), totalPrestigeEarnings:0 };

// ============ HELPERS ============
const own = id => S.upg[id]||0;
const cost = u => Math.floor(u.b * Math.pow(u.m, own(u.id)));
function prestigeMult() { return 1 + S.prestige * PRESTIGE_MULT; }
function comboMult() { return Math.min(COMBO_MAX_MULT, 1 + S.combo * 0.04); }

function recalc() {
  S.pc=1; S.ps=0;
  for(const u of UPG){ const n=own(u.id); S.pc+=u.pc*n; S.ps+=u.ps*n; }
  // apply prestige multiplier
  S.pc = Math.floor(S.pc * prestigeMult());
  S.ps = Math.floor(S.ps * prestigeMult());
}
function psl() {
  // use total across all prestiges
  const t = S.total + S.totalPrestigeEarnings;
  if(t<=0)return 0;
  return Math.min(10, parseFloat((Math.log10(t+1)).toFixed(2)));
}
function getRank(p){ let r=RANKS[0]; for(const x of RANKS) if(p>=x.min)r=x; return r; }
function fmt(n){
  if(n>=1e15)return(n/1e15).toFixed(1)+"Q";
  if(n>=1e12)return(n/1e12).toFixed(1)+"T";
  if(n>=1e9)return(n/1e9).toFixed(1)+"B";
  if(n>=1e6)return(n/1e6).toFixed(1)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"K";
  return Math.floor(n);
}
function lerp(a,b,t){ return a+(b-a)*Math.min(1,Math.max(0,t)); }

// ============ PRESTIGE ============
function canPrestige() { return S.total >= PRESTIGE_COST; }
function doPrestige() {
  if(!canPrestige()) return;
  S.totalPrestigeEarnings += S.total;
  S.prestige++;
  S.pts = 0; S.total = 0; S.upg = {}; S.stim = 0;
  S.combo = 0; S.clicks = 0;
  recalc();
  render();
  // big effects
  screenShake(3); flash("rgba(255,92,53,0.5)"); chromatic();
  setTimeout(()=>{ flash("rgba(192,132,252,0.3)"); screenShake(3); }, 200);
  setTimeout(()=>{ flash("rgba(255,159,28,0.3)"); chromatic(); }, 400);
  const rect = document.getElementById("face").getBoundingClientRect();
  particles(rect.left+rect.width/2, rect.top+rect.height/2, 60);
  toast("🔄 PRESTIGE " + S.prestige + "! x" + prestigeMult().toFixed(2) + " multiplier!");
  log("PRESTIGE " + S.prestige + " — multiplier now x" + prestigeMult().toFixed(2), true);
  checkAch();
}

// ============ COMBO ============
function tickCombo() {
  const now = Date.now();
  if(S.combo > 0 && now - S.lastClickTime > COMBO_DECAY_MS) {
    S.combo = 0;
  }
}
function addCombo() {
  S.combo++;
  S.lastClickTime = Date.now();
  if(S.combo > S.maxCombo) S.maxCombo = S.combo;
}

// ============ GOLDEN CLICK ============
let goldenActive = false;
let goldenTimeout = null;

function spawnGolden() {
  if(goldenActive) return;
  goldenActive = true;
  toast("✨ GOLDEN MEW! Click fast!");
  log("GOLDEN MEW appeared!", true);
  flash("rgba(255,92,53,0.2)");
  goldenTimeout = setTimeout(()=>{
    goldenActive = false;
    toast("💨 Golden mew expired...");
  }, GOLDEN_DURATION);
}

function claimGolden() {
  if(!goldenActive) return;
  goldenActive = false;
  clearTimeout(goldenTimeout);
  const bonus = Math.floor(S.pc * GOLDEN_MULT * comboMult());
  S.pts += bonus; S.total += bonus;
  S.goldenClicks = (S.goldenClicks||0) + 1;
  toast("✨ GOLDEN! +" + fmt(bonus) + "!");
  log("Golden mew claimed: +" + fmt(bonus), true);
  screenShake(3); flash("rgba(255,159,28,0.4)"); chromatic();
  const rect = document.getElementById("face").getBoundingClientRect();
  particles(rect.left+rect.width/2, rect.top+rect.height/2, 30);
  checkAch();
}

// ============ OFFLINE EARNINGS ============
function calcOfflineEarnings() {
  if(!S.lastSaveTime || S.ps <= 0) return 0;
  const elapsed = (Date.now() - S.lastSaveTime) / 1000;
  if(elapsed < 30) return 0; // only show if away 30s+
  return Math.floor(S.ps * elapsed * 0.5); // 50% efficiency offline
}

// ============ SAVE / LOAD ============
const SAVE_KEY = "owen_lm_v4";
function save(){
  S.lastSaveTime = Date.now();
  localStorage.setItem(SAVE_KEY, JSON.stringify(S));
}
function load(){
  const r=localStorage.getItem(SAVE_KEY);
  if(r){ try{
    const loaded = JSON.parse(r);
    // migrate from v3
    if(!loaded.prestige) loaded.prestige = 0;
    if(!loaded.combo) loaded.combo = 0;
    if(!loaded.maxCombo) loaded.maxCombo = 0;
    if(!loaded.goldenClicks) loaded.goldenClicks = 0;
    if(!loaded.totalPrestigeEarnings) loaded.totalPrestigeEarnings = 0;
    if(!loaded.lastSaveTime) loaded.lastSaveTime = Date.now();
    Object.assign(S, loaded);
    recalc();
    // offline earnings
    const offline = calcOfflineEarnings();
    if(offline > 0) {
      S.pts += offline; S.total += offline;
      setTimeout(()=>{
        toast("💤 Welcome back! +" + fmt(offline) + " earned while away");
        log("Offline earnings: +" + fmt(offline), true);
      }, 500);
    }
  }catch(e){} }
}

// ============ SCREEN SHAKE ============
function screenShake(level) {
  const el = document.getElementById("game");
  el.classList.remove("shake-1","shake-2","shake-3");
  void el.offsetWidth;
  el.classList.add("shake-"+level);
}

// ============ FLASH ============
function flash(color) {
  const el = document.getElementById("flash");
  el.style.background = color || "rgba(255,255,255,0.15)";
  el.classList.add("fire");
  setTimeout(()=>el.classList.remove("fire"), 80);
}

// ============ CHROMATIC ABERRATION ============
function chromatic() {
  const el = document.getElementById("chroma-wrap");
  el.classList.remove("aberr"); void el.offsetWidth;
  el.classList.add("aberr");
}

// ============ WOBBLE ============
function wobble() {
  const el = document.getElementById("click-area");
  el.classList.remove("wobble"); void el.offsetWidth;
  el.classList.add("wobble");
}

// ============ PARTICLES ============
function particles(x, y, count) {
  const colors = ["#ff5c35","#ff9f1c","#c084fc","#4ade80","#fff"];
  for(let i=0;i<count;i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const sz = 3 + Math.random()*5;
    p.style.width = sz+"px"; p.style.height = sz+"px";
    p.style.left = x+"px"; p.style.top = y+"px";
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    const angle = Math.random()*Math.PI*2;
    const dist = 30 + Math.random()*60;
    const dur = 0.3 + Math.random()*0.4;
    p.style.setProperty("--dx", Math.cos(angle)*dist+"px");
    p.style.setProperty("--dy", Math.sin(angle)*dist+"px");
    p.style.setProperty("--dur", dur+"s");
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), dur*1000);
  }
}

// ============ FLOAT TEXT ============
function floatText(x, y, text, color) {
  const ft = document.createElement("div");
  ft.className = "ft";
  ft.textContent = text;
  ft.style.color = color || "#ffd600";
  ft.style.left = (x + (Math.random()*30-15))+"px";
  ft.style.top = (y - 10)+"px";
  ft.style.setProperty("--r", (Math.random()*10-5)+"deg");
  document.body.appendChild(ft);
  setTimeout(()=>ft.remove(), 600);
}

// ============ LOG / TOAST ============
function log(m,hl){
  const el=document.getElementById("log"),s=document.createElement("span");
  if(hl)s.className="hl"; s.textContent=m; el.prepend(s);
  if(el.children.length>30)el.lastChild.remove();
}
let _tt;
function toast(m){
  const el=document.getElementById("toast"); el.textContent=m;
  el.classList.add("show"); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove("show"),2500);
}

// ============ STIM ============
function addStim(amount) {
  S.stim = Math.min(100, S.stim + amount);
  if(S.stim >= 100) { stimBurst(); S.stim = 0; }
}

function stimBurst() {
  screenShake(3);
  flash("rgba(255,92,53,0.25)");
  chromatic(); wobble();
  setTimeout(()=>{ flash("rgba(192,132,252,0.2)"); screenShake(2); }, 150);
  setTimeout(()=>{ flash("rgba(255,159,28,0.2)"); chromatic(); }, 300);

  const rect = document.getElementById("face").getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  particles(cx, cy, 40);

  const bonus = Math.floor(S.pc * 10);
  S.pts += bonus; S.total += bonus;
  floatText(cx, cy-30, "STIMMED! +" + fmt(bonus), "#ff5c35");
  toast("🌀 STIM BURST! +" + fmt(bonus) + " bonus!");
  log("STIM BURST — +" + fmt(bonus) + " bonus mew points!", true);

  // ~8% chance to trigger emote 67
  if(Math.random() < 0.08) {
    emote67Active = true;
    emote67Timer = 0;
    S.ach["e67"] = true;
    toast("🫳🫳 EMOTE 67 ACTIVATED 🫳🫳");
    log("RARE: Emote 67 triggered!", true);
    screenShake(3);
    flash("rgba(255,92,53,0.3)");
  }
}

// ============ FACE SYSTEM - Real PNGs ============
const canvas = document.getElementById("face");
const ctx = canvas.getContext("2d");

// Preload face images
const faceImgs = [];
let facesLoaded = 0;
for(let i = 0; i < FACE_IMAGES.length; i++) {
  const img = new Image();
  img.onload = () => facesLoaded++;
  img.src = FACE_IMAGES[i];
  faceImgs.push(img);
}

function getFaceIndex(pslVal) {
  // map 0-10 PSL to 0-7 face index
  const idx = Math.floor(pslVal / 10 * (faceImgs.length - 0.01));
  return Math.min(faceImgs.length - 1, Math.max(0, idx));
}

let stimIntensity = 0;
let emote67Timer = 0;
let emote67Active = false;

function drawFace(t, time) {
  const W = 200, H = 280;
  ctx.clearRect(0, 0, W, H);
  if(facesLoaded < 1) return;

  const si = stimIntensity;
  const pslVal = t * 10;
  const idx = getFaceIndex(pslVal);

  // stim shake
  const shakeX = si > 0.1 ? Math.sin(time * 28) * si * 10 : 0;
  const shakeY = si > 0.1 ? Math.cos(time * 33) * si * 6 : 0;
  const rot = si > 0.2 ? Math.sin(time * 20) * si * 0.08 : Math.sin(time * 0.8) * 0.01;
  const throb = 1 + (si > 0.3 ? Math.sin(time * 16) * si * 0.04 : 0);

  // draw face image centered
  ctx.save();
  ctx.translate(W/2 + shakeX, 120 + shakeY);
  ctx.rotate(rot);
  ctx.scale(throb, throb);

  const img = faceImgs[idx];
  if(img && img.complete) {
    ctx.drawImage(img, -100, -120, 200, 240);
  }

  // blend to next stage
  const blend = (pslVal / 10 * (faceImgs.length - 1)) % 1;
  if(blend > 0.1 && idx < faceImgs.length - 1) {
    const next = faceImgs[idx + 1];
    if(next && next.complete) {
      ctx.globalAlpha = blend;
      ctx.drawImage(next, -100, -120, 200, 240);
      ctx.globalAlpha = 1;
    }
  }

  ctx.restore();

  // stim screen effects
  if(si > 0.5) {
    ctx.fillStyle = `rgba(255,42,80,${(si-0.5)*0.12})`;
    ctx.fillRect(0, 0, W, H);
  }
  if(si > 0.7) {
    for(let i = 0; i < (si-0.7)*12; i++) {
      ctx.fillStyle = `rgba(255,92,53,${0.08+Math.random()*0.08})`;
      ctx.fillRect(0, Math.random()*H, W, 1+Math.random()*2);
    }
  }
  // chromatic ghost at extreme stim
  if(si > 0.85 && img && img.complete) {
    ctx.globalAlpha = 0.12;
    ctx.drawImage(img, W/2-100-3+shakeX, 120-120+shakeY, 200, 240);
    ctx.drawImage(img, W/2-100+3+shakeX, 120-120+shakeY, 200, 240);
    ctx.globalAlpha = 1;
  }

  // aura glow
  if(t > 0.75) {
    const ga = lerp(0, 0.1, (t-0.75)/0.25);
    const grad = ctx.createRadialGradient(W/2, 120, 20, W/2, 120, 100);
    grad.addColorStop(0, `rgba(255,180,50,${ga})`);
    grad.addColorStop(1, "rgba(255,180,50,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // emote 67
  if(emote67Active) {
    const ep = emote67Timer;
    ctx.font = "bold 28px 'JetBrains Mono', monospace";
    ctx.textAlign = "center";
    ctx.fillStyle = `rgba(255,92,53,${0.5+Math.sin(time*15)*0.5})`;
    ctx.fillText("67", W/2 + Math.sin(time*20)*15, 50);
  }

  // STIMMING HANDS
  if(si > 0.08 && !emote67Active) {
    drawRealisticHands(time, si, W, H);
  }
  if(emote67Active) {
    drawEmote67Hands(time, emote67Timer, W, H);
  }
}

// ============ REALISTIC HAND DRAWING ============
function drawHand(cx, cy, angle, fingerSpread, scale) {
  // skin colors
  const palm = "rgb(220,190,165)";
  const palmShadow = "rgb(195,165,140)";
  const finger = "rgb(215,185,160)";
  const nail = "rgb(235,215,200)";

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.scale(scale, scale);

  // wrist/forearm
  ctx.fillStyle = palmShadow;
  ctx.beginPath();
  ctx.ellipse(0, 22, 8, 14, 0, 0, Math.PI*2);
  ctx.fill();

  // palm
  ctx.fillStyle = palm;
  ctx.beginPath();
  ctx.moveTo(-12, 8);
  ctx.quadraticCurveTo(-14, -2, -10, -8);
  ctx.lineTo(10, -8);
  ctx.quadraticCurveTo(14, -2, 12, 8);
  ctx.quadraticCurveTo(10, 16, 0, 18);
  ctx.quadraticCurveTo(-10, 16, -12, 8);
  ctx.fill();

  // palm line detail
  ctx.strokeStyle = "rgba(170,140,115,0.3)";
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(-8, 4); ctx.quadraticCurveTo(0, 0, 8, 4);
  ctx.stroke();

  // fingers - 5 fingers with segments
  const fingers = [
    { x:-11, baseAngle:-0.3, len1:10, len2:8, w:3.5 },   // thumb (shorter, wider)
    { x:-6,  baseAngle:-0.12, len1:12, len2:10, w:3 },    // index
    { x:-1,  baseAngle:0,     len1:14, len2:11, w:3 },    // middle (longest)
    { x:4,   baseAngle:0.08,  len1:13, len2:10, w:2.8 },  // ring
    { x:8,   baseAngle:0.2,   len1:10, len2:8,  w:2.5 },  // pinky
  ];

  for(let i = 0; i < fingers.length; i++) {
    const f = fingers[i];
    const spread = f.baseAngle + (i === 0 ? fingerSpread*-0.5 : fingerSpread * (i-2) * 0.08);

    ctx.save();
    ctx.translate(f.x, -8);
    ctx.rotate(spread);

    // first segment
    ctx.fillStyle = finger;
    ctx.beginPath();
    ctx.roundRect(-f.w/2, -f.len1, f.w, f.len1, 2);
    ctx.fill();

    // knuckle
    ctx.fillStyle = palmShadow;
    ctx.beginPath();
    ctx.ellipse(0, -f.len1, f.w/2+0.5, 2, 0, 0, Math.PI*2);
    ctx.fill();

    // second segment
    ctx.translate(0, -f.len1);
    ctx.fillStyle = finger;
    ctx.beginPath();
    ctx.roundRect(-f.w/2+0.3, -f.len2, f.w-0.6, f.len2, 2);
    ctx.fill();

    // fingernail
    ctx.fillStyle = nail;
    ctx.beginPath();
    ctx.roundRect(-f.w/2+0.8, -f.len2, f.w-1.6, f.len2*0.4, [2,2,0,0]);
    ctx.fill();

    ctx.restore();
  }

  ctx.restore();
}

function drawRealisticHands(time, si, W, H) {
  const alpha = Math.min(1, si * 3);
  ctx.globalAlpha = alpha;

  // hand flapping: wrist stays at sides, hands pivot up/down rapidly
  const flapSpeed = lerp(6, 30, si);
  const flapAmount = lerp(0.05, 0.6, si);

  // finger spread increases with stim
  const fingerSpread = lerp(0, 1, si);

  for(let side of [-1, 1]) {
    const baseX = W/2 + side * 65;
    const baseY = H - 55;

    // the flap: hand rotates at the wrist
    const flapAngle = Math.sin(time * flapSpeed + side * 0.8) * flapAmount;

    // slight arm bob
    const armBob = Math.abs(Math.sin(time * flapSpeed + side * 0.8)) * si * 5;

    drawHand(
      baseX,
      baseY - armBob,
      flapAngle * side * -1,  // mirror for left hand
      fingerSpread,
      0.9 + si * 0.15
    );
  }

  ctx.globalAlpha = 1;
}

function drawEmote67Hands(time, ep, W, H) {
  // hands come together, fingers spread, rapid wiggle
  const baseY = H - 60;

  for(let side of [-1, 1]) {
    const startX = W/2 + side * 80;
    const endX = W/2 + side * 30;
    const handX = lerp(startX, endX, Math.min(1, ep * 2.5));
    const wiggle = ep > 0.3 ? Math.sin(time * 28) * 0.3 : 0;
    const spread = ep > 0.2 ? lerp(0, 2, (ep-0.2)*2) : 0;

    drawHand(handX, baseY, wiggle * side * -1, spread, 1);
  }
}

function playHuh() {
  huhSound.currentTime = 0;
  huhSound.play().catch(()=>{});
}

function initMic() {
  if(micInited) return;
  micInited = true;
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const audioCtx = new AudioContext();
    const src = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.5;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    function poll() {
      analyser.getByteFrequencyData(data);
      let sum = 0;
      for(let i = 0; i < data.length; i++) sum += data[i];
      micVolume = sum / data.length / 255;
      micSmooth = micSmooth * 0.7 + micVolume * 0.3;
      const nowTalking = micSmooth > MIC_THRESHOLD;
      if(nowTalking && !micWasTalking) {
        playHuh();
      }
      micWasTalking = nowTalking;
      micActive = nowTalking;
      requestAnimationFrame(poll);
    }
    poll();
    log("MIC ON — talk to trigger bird mode", true);
    toast("🎤 Mic connected! Talk to activate bird mode");
  }).catch(e => {
    micInited = false;
    log("Mic denied — will retry on next click", false);
  });
}

function tryMicOnce() {
  initMic();
  document.removeEventListener("click", tryMicOnce);
  document.removeEventListener("touchstart", tryMicOnce);
}
document.addEventListener("click", tryMicOnce);
document.addEventListener("touchstart", tryMicOnce);

function drawBird(time) {
  if(!micReady) return;
  const W = 200, H = 280;
  ctx.clearRect(0, 0, W, H);

  const shakeX = (Math.random() - 0.5) * micSmooth * 60;
  const shakeY = (Math.random() - 0.5) * micSmooth * 60;
  const scale = 1 + micSmooth * 0.15;
  const rot = Math.sin(time * 15) * micSmooth * 0.1;

  ctx.save();
  ctx.translate(W/2 + shakeX, H/2 + shakeY);
  ctx.rotate(rot);
  ctx.scale(scale, scale);

  const aspect = birdImg.width / birdImg.height;
  let drawW = 180, drawH = drawW / aspect;
  if(drawH > 240) { drawH = 240; drawW = drawH * aspect; }
  ctx.drawImage(birdImg, -drawW/2, -drawH/2, drawW, drawH);

  if(micSmooth > 0.05) {
    ctx.globalAlpha = micSmooth * 0.4;
    ctx.fillStyle = "#ff0000";
    ctx.fillRect(-drawW/2, -drawH/2, drawW, drawH);
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  if(micSmooth > 0.08) {
    for(let i = 0; i < 3; i++) {
      const y = Math.random() * H;
      const h = 1 + Math.random() * 3;
      ctx.fillStyle = "rgba(255,92,53," + (micSmooth * 0.3) + ")";
      ctx.fillRect(Math.random() * 20 - 10, y, W, h);
    }
  }

  ctx.save();
  ctx.font = "bold 14px 'JetBrains Mono', monospace";
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(255,92,53," + (0.5 + Math.sin(time * 8) * 0.5) + ")";
  ctx.fillText("🎤 LISTENING", W/2, H - 8);
  ctx.restore();
}

// ============ CLICK ============
document.getElementById("click-area").addEventListener("click", (e) => {
  addCombo();
  const cm = comboMult();
  const clickVal = Math.floor(S.pc * cm);
  S.pts += clickVal; S.total += clickVal; S.clicks++;

  // golden click check
  if(goldenActive) { claimGolden(); }

  const p = psl();
  const intensity = Math.min(3, Math.floor(p/3) + 1);
  wobble(); screenShake(intensity);
  if(p >= 2) flash("rgba(255,255,255,0.08)");
  if(p >= 4) chromatic();
  if(p >= 6) flash(`rgba(${Math.random()>0.5?'255,92,53':'192,132,252'},0.12)`);

  particles(e.clientX, e.clientY, Math.min(15, 2 + Math.floor(p * 1.2)));
  const colors = ["#ff5c35","#ff9f1c","#c084fc","#4ade80","#fff"];
  const ftColor = S.combo >= 50 ? "#ff00ff" : S.combo >= 20 ? "#00ffc8" : S.combo >= 10 ? "#ffd600" : colors[Math.floor(Math.random()*colors.length)];
  floatText(e.clientX, e.clientY, "+"+fmt(clickVal) + (S.combo>=5 ? " x"+S.combo : ""), ftColor);

  addStim(lerp(2, 0.5, p/10));
  checkAch(); render();
});

// ============ BUY ============
function buy(id) {
  const u = UPG.find(u=>u.id===id);
  const c = cost(u);
  if(S.pts < c) return;
  S.pts -= c;
  S.upg[id] = (S.upg[id]||0)+1;
  recalc();
  log("Purchased "+u.nm+" (x"+own(u.id)+")");
  screenShake(1); flash("rgba(255,92,53,0.1)");
  checkAch(); render();
}

// ============ ACHIEVEMENTS ============
function checkAch() {
  for(const a of ACH) {
    if(!S.ach[a.id] && a.ck()) {
      S.ach[a.id] = true;
      toast("🏆 "+a.nm+" — "+a.ds);
      log("Achievement: "+a.nm, true);
      screenShake(2); flash("rgba(255,92,53,0.2)"); chromatic();
    }
  }
}

// ============ RENDER ============
function render() {
  document.getElementById("s-pts").textContent = fmt(S.pts);
  document.getElementById("s-pc").textContent = fmt(Math.floor(S.pc * comboMult()));
  document.getElementById("s-ps").textContent = fmt(S.ps);
  document.getElementById("s-total").textContent = fmt(S.total + S.totalPrestigeEarnings);

  const p = psl(), r = getRank(p);
  document.getElementById("psl-fill").style.width = Math.min(100,p/10*100)+"%";
  document.getElementById("psl-num").textContent = p.toFixed(1)+" / 10.0";
  document.getElementById("psl-in").textContent = p.toFixed(1);
  const rl = document.getElementById("rank");
  rl.textContent = r.nm; rl.style.color = r.c;

  // stim
  document.getElementById("stim-fill").style.width = S.stim+"%";
  document.getElementById("stim-pct").textContent = Math.floor(S.stim)+"%";
  const sf = document.getElementById("stim-fill");
  if(S.stim >= 80) sf.classList.add("maxed"); else sf.classList.remove("maxed");

  // combo
  const comboEl = document.getElementById("combo-display");
  if(comboEl) {
    if(S.combo >= 3) {
      comboEl.style.display = "block";
      comboEl.textContent = S.combo + "x COMBO (x" + comboMult().toFixed(1) + ")";
      comboEl.style.color = S.combo>=50?"#c084fc":S.combo>=20?"#4ade80":S.combo>=10?"#ff9f1c":"var(--accent)";
    } else {
      comboEl.style.display = "none";
    }
  }

  // prestige button
  const prestEl = document.getElementById("prestige-btn");
  if(prestEl) {
    if(S.total >= PRESTIGE_COST * 0.5) { // show at 50% of cost
      prestEl.style.display = "block";
      if(canPrestige()) {
        prestEl.classList.remove("lk");
        prestEl.innerHTML = "🔄 PRESTIGE (x" + ((S.prestige+1)*PRESTIGE_MULT+1).toFixed(2) + " mult)";
      } else {
        prestEl.classList.add("lk");
        prestEl.innerHTML = "🔄 PRESTIGE (need " + fmt(PRESTIGE_COST) + ")";
      }
    } else {
      prestEl.style.display = "none";
    }
  }

  // prestige info
  const prInfoEl = document.getElementById("prestige-info");
  if(prInfoEl) {
    if(S.prestige > 0) {
      prInfoEl.style.display = "block";
      prInfoEl.textContent = "⭐ Prestige " + S.prestige + " — x" + prestigeMult().toFixed(2) + " multiplier";
    } else {
      prInfoEl.style.display = "none";
    }
  }

  // golden indicator
  const goldEl = document.getElementById("golden-indicator");
  if(goldEl) {
    goldEl.style.display = goldenActive ? "block" : "none";
  }

  // upgrades
  const ul = document.getElementById("ul");
  ul.innerHTML = "";
  for(const u of UPG) {
    const c=cost(u), can=S.pts>=c;
    const d=document.createElement("div");
    d.className="ug"+(can?"":" lk");
    d.onclick=()=>buy(u.id);
    d.innerHTML='<div class="ic">'+u.ic+'</div><div class="inf"><div class="nm">'+u.nm+'</div><div class="ds">'+u.ds+'</div></div><div class="rt"><div class="co">'+fmt(c)+'</div><div class="ow">x'+own(u.id)+'</div></div>';
    ul.appendChild(d);
  }

  // achievements
  const ag = document.getElementById("ag");
  ag.innerHTML="";
  for(const a of ACH) {
    const d=document.createElement("div");
    d.className="ac"+(S.ach[a.id]?" un":"");
    d.innerHTML=a.ic+'<div class="tt"><b>'+a.nm+'</b><br>'+a.ds+'</div>';
    ag.appendChild(d);
  }
}

// ============ ANIMATION LOOP ============
function animate(ts) {
  const time = ts / 1000;
  tickCombo();

  if(typeof micActive !== 'undefined' && micActive) {
    drawBird(time);
    if(micSmooth > 0.06) {
      screenShake(Math.min(3, Math.floor(micSmooth * 20)));
      if(Math.random() < micSmooth * 2) chromatic();
      if(Math.random() < micSmooth) flash(`rgba(255,46,80,${micSmooth*0.3})`);
    }
  } else {
    drawFace(psl() / 10, time);
    stimIntensity = lerp(stimIntensity, S.stim / 100, 0.1);
    if(emote67Active) {
      emote67Timer += 0.012;
      if(emote67Timer >= 1) { emote67Active = false; emote67Timer = 0; }
    }
    drawStimHands(time);
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ============ PASSIVE TICK ============
setInterval(()=>{
  if(S.ps>0){
    const g=S.ps/10;
    S.pts+=g; S.total+=g;
    addStim(0.05);
    checkAch(); render();
  }
  // golden click spawn
  if(Math.random() < GOLDEN_CHANCE && S.total > 100) {
    spawnGolden();
  }
}, 100);

// ============ STIM DECAY ============
setInterval(()=>{
  if(S.stim > 0) {
    S.stim = Math.max(0, S.stim - 0.3);
    document.getElementById("stim-fill").style.width = S.stim+"%";
    document.getElementById("stim-pct").textContent = Math.floor(S.stim)+"%";
  }
}, 200);

// ============ COMBO DISPLAY UPDATE ============
setInterval(()=>{
  tickCombo();
  const comboEl = document.getElementById("combo-display");
  if(comboEl && S.combo < 3) comboEl.style.display = "none";
}, 100);

// ============ RANDOM EVENTS ============
setInterval(()=>{
  if(Math.random()<0.15 && S.total>50){
    const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
    log("EVENT: "+ev, true);
    toast("📢 "+ev);
    screenShake(1);
  }
}, 18000);

// ============ INIT ============
load(); render();
setInterval(save, 10000);
window.addEventListener("beforeunload", save);
</script>
</body></html>
