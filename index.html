<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owen Looksmax Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080c;
  --panel: #0e0e16;
  --border: #1a1a2a;
  --accent: #ff2e50;
  --gold: #ffd600;
  --teal: #00ffc8;
  --text: #ccc;
  --dim: #444;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { overflow-x: hidden; }
body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  user-select: none;
}

/* SCREEN SHAKE */
.shake-1 { animation: shake1 .12s linear; }
.shake-2 { animation: shake2 .18s linear; }
.shake-3 { animation: shake3 .25s linear; }
@keyframes shake1 {
  0%,100%{transform:translate(0)} 25%{transform:translate(-3px,2px)} 50%{transform:translate(3px,-2px)} 75%{transform:translate(-2px,-1px)}
}
@keyframes shake2 {
  0%,100%{transform:translate(0)} 20%{transform:translate(-6px,4px)} 40%{transform:translate(5px,-5px)} 60%{transform:translate(-4px,3px)} 80%{transform:translate(6px,-2px)}
}
@keyframes shake3 {
  0%,100%{transform:translate(0)} 10%{transform:translate(-10px,6px)} 30%{transform:translate(8px,-8px)} 50%{transform:translate(-12px,4px)} 70%{transform:translate(10px,-6px)} 90%{transform:translate(-6px,8px)}
}

/* FLASH */
#flash { position:fixed; inset:0; pointer-events:none; z-index:100; opacity:0; transition:opacity 0.05s; }
#flash.fire { opacity:1; }

/* CHROMATIC ABERRATION */
#chroma-wrap { filter:none; transition:filter 0.1s; }
#chroma-wrap.aberr { animation: chroma .2s ease-out; }
@keyframes chroma {
  0%{ filter: drop-shadow(-3px 0 0 rgba(255,0,50,.5)) drop-shadow(3px 0 0 rgba(0,200,255,.5)); }
  100%{ filter: none; }
}

/* SCANLINES */
#scanlines {
  position:fixed; inset:0; pointer-events:none; z-index:50;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  opacity:0.5;
}

/* WOBBLE */
.wobble { animation: wobble .3s ease-out; }
@keyframes wobble {
  0%{transform:scale(1)} 25%{transform:scale(1.04,0.96)} 50%{transform:scale(0.96,1.04)} 75%{transform:scale(1.02,0.98)} 100%{transform:scale(1)}
}

/* LAYOUT */
header { text-align:center; padding:16px 12px 4px; }
header h1 {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.8rem,6vw,3rem);
  letter-spacing:6px;
  text-transform:uppercase;
  background: linear-gradient(135deg, var(--accent), var(--gold), var(--teal));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.sub { font-size:.6rem; color:var(--dim); letter-spacing:4px; text-transform:uppercase; }

.game {
  max-width:920px; margin:0 auto; padding:8px;
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
}
@media(max-width:640px){ .game{grid-template-columns:1fr;} }
.full { grid-column:1/-1; }

.p { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px; }
.pt {
  font-family:'Bebas Neue',sans-serif; font-size:.95rem;
  letter-spacing:2px; color:var(--dim); text-transform:uppercase;
  margin-bottom:8px; border-bottom:1px solid var(--border); padding-bottom:5px;
}

/* STATS */
.stats { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; text-align:center; padding:8px; }
.st .v { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; color:var(--gold); line-height:1; }
.st .l { font-size:.55rem; color:var(--dim); letter-spacing:2px; text-transform:uppercase; }

/* PSL BAR */
.psl-row { display:flex; justify-content:space-between; font-size:.6rem; color:var(--dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.psl-bar { height:20px; background:#111; border-radius:10px; overflow:hidden; border:1px solid var(--border); position:relative; }
.psl-fill { height:100%; border-radius:10px; transition:width .4s; position:relative;
  background: linear-gradient(90deg, #ff2e50, #ff8800, #ffd600, #00ffc8, #00aaff);
}
.psl-inner { position:absolute; right:8px; top:50%; transform:translateY(-50%);
  font-family:'Bebas Neue',sans-serif; font-size:.8rem; color:#000; text-shadow:0 0 4px rgba(255,255,255,.5);
}
.rank { text-align:center; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; margin-top:4px; letter-spacing:3px; }

/* STIM METER */
.stim-wrap { margin-top:8px; }
.stim-label { font-size:.55rem; color:var(--dim); letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; display:flex; justify-content:space-between; }
.stim-bar { height:10px; background:#111; border-radius:5px; overflow:hidden; border:1px solid var(--border); }
.stim-fill { height:100%; border-radius:5px; transition:width .15s;
  background: linear-gradient(90deg, var(--accent), #ff00ff, #00ffff);
}
.stim-fill.maxed { animation: stimPulse .3s infinite alternate; }
@keyframes stimPulse { 0%{opacity:.7} 100%{opacity:1;box-shadow:0 0 12px #ff00ff;} }

/* FACE / CLICKER */
.click-area { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; position:relative; cursor:pointer; }
#face { border-radius:12px; image-rendering:auto; }
.click-hint { font-size:.55rem; color:var(--dim); margin-top:8px; letter-spacing:2px; text-transform:uppercase; }
.mic-btn {
  margin-top:8px; padding:5px 14px; border:1px solid var(--accent); border-radius:5px;
  background:transparent; color:var(--accent); font-family:inherit; font-size:.6rem;
  letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .2s;
}
.mic-btn:hover { background:var(--accent); color:#000; }

/* FLOAT TEXT */
.ft {
  position:fixed; pointer-events:none; z-index:200;
  font-family:'Bebas Neue',sans-serif; font-size:1.6rem;
  text-shadow:0 0 10px currentColor;
  animation: ftUp .6s ease-out forwards;
}
@keyframes ftUp {
  0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}
  100%{opacity:0;transform:translateY(-60px) scale(1.4) rotate(var(--r,5deg))}
}

/* PARTICLES */
.particle {
  position:fixed; pointer-events:none; z-index:150; border-radius:50%;
  animation: particleOut var(--dur,.5s) ease-out forwards;
}
@keyframes particleOut {
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx,20px),var(--dy,-40px)) scale(0)}
}

/* UPGRADES */
.ul { display:flex; flex-direction:column; gap:5px; max-height:380px; overflow-y:auto; }
.ul::-webkit-scrollbar{width:3px} .ul::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ug {
  display:flex; align-items:center; gap:8px; padding:7px 9px;
  background:rgba(255,255,255,.015); border:1px solid var(--border); border-radius:5px;
  cursor:pointer; transition:border-color .2s, background .2s;
}
.ug:hover{border-color:var(--accent);background:rgba(255,46,80,.04)}
.ug.lk{opacity:.3;cursor:not-allowed} .ug.lk:hover{border-color:var(--border);background:transparent}
.ug .ic{font-size:1.2rem;width:28px;text-align:center;flex-shrink:0}
.ug .inf{flex:1;min-width:0} .ug .nm{font-size:.7rem;font-weight:700;color:#ddd}
.ug .ds{font-size:.55rem;color:var(--dim)}
.ug .rt{text-align:right;flex-shrink:0} .ug .co{font-size:.7rem;color:var(--gold);font-weight:700}
.ug .ow{font-size:.55rem;color:var(--accent)}

/* ACHIEVEMENTS */
.ag{display:flex;flex-wrap:wrap;gap:5px}
.ac{width:34px;height:34px;border-radius:5px;background:#111;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;opacity:.2;transition:all .3s;position:relative}
.ac.un{opacity:1;border-color:var(--gold);box-shadow:0 0 8px rgba(255,214,0,.2)}
.ac .tt{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--border);padding:3px 7px;border-radius:3px;font-size:.5rem;color:var(--text);white-space:nowrap;z-index:10}
.ac:hover .tt{display:block}

/* LOG */
.log{max-height:50px;overflow-y:auto;font-size:.55rem;color:var(--dim);text-align:center;padding:4px}
.log::-webkit-scrollbar{width:2px} .log::-webkit-scrollbar-thumb{background:var(--border)}
.log span{display:block;line-height:1.5} .log .hl{color:var(--teal)}

/* TOAST */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--panel);border:1px solid var(--gold);padding:8px 18px;border-radius:6px;font-size:.7rem;color:var(--gold);z-index:300;transition:transform .35s ease;pointer-events:none;text-align:center;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}

footer{text-align:center;font-size:.5rem;color:#222;padding:10px;letter-spacing:1px}
</style>
</head>
<body>

<div id="flash"></div>
<div id="scanlines"></div>

<div id="chroma-wrap">
<header>
  <h1>Owen Looksmax Simulator</h1>
  <div class="sub">The Grind Never Stops</div>
</header>

<div class="game" id="game">
  <div class="p stats full">
    <div class="st"><div class="v" id="s-pts">0</div><div class="l">Mew Points</div></div>
    <div class="st"><div class="v" id="s-pc">1</div><div class="l">Per Click</div></div>
    <div class="st"><div class="v" id="s-ps">0</div><div class="l">Per Sec</div></div>
    <div class="st"><div class="v" id="s-total">0</div><div class="l">Lifetime</div></div>
  </div>

  <div class="p full">
    <div class="psl-row"><span>PSL Rating</span><span id="psl-num">0.0 / 10.0</span></div>
    <div class="psl-bar"><div class="psl-fill" id="psl-fill"><span class="psl-inner" id="psl-in"></span></div></div>
    <div class="rank" id="rank" style="color:var(--accent)">Subhuman</div>
    <div class="stim-wrap">
      <div class="stim-label"><span>Stimming</span><span id="stim-pct">0%</span></div>
      <div class="stim-bar"><div class="stim-fill" id="stim-fill"></div></div>
    </div>
  </div>

  <div class="p click-area" id="click-area">
    <canvas id="face" width="200" height="280"></canvas>
    <div class="click-hint">tap to mew</div>
  </div>

  <div class="p">
    <div class="pt">Upgrades</div>
    <div class="ul" id="ul"></div>
  </div>

  <div class="p full">
    <div class="pt">Achievements</div>
    <div class="ag" id="ag"></div>
  </div>

  <div class="p log full" id="log"></div>
</div>
</div>

<div class="toast" id="toast"></div>
<footer>auto-saves every 10s &middot; owen looksmax simulator v0.3</footer>

<!-- LOAD ORDER MATTERS -->
<script>
// ============ UPGRADES ============
const UPG = [
  {id:"mew",     ic:"👅",nm:"Mewing Practice",      ds:"+1/click",              b:15,    m:1.35,pc:1,  ps:0},
  {id:"jaw",     ic:"🦴",nm:"Jawline Exerciser",     ds:"+3/click",              b:100,   m:1.45,pc:3,  ps:0},
  {id:"gum",     ic:"🍖",nm:"Falim Gum Pack",        ds:"+8/click",              b:500,   m:1.5, pc:8,  ps:0},
  {id:"bone",    ic:"💀",nm:"Bonesmashing Session",   ds:"+25/click (trust bro)", b:4000,  m:1.55,pc:25, ps:0},
  {id:"cant",    ic:"👁️",nm:"Canthal Tilt Surgery",  ds:"+100/click hunter eyes",b:80000, m:1.75,pc:100,ps:0},
  {id:"cold",    ic:"🥶",nm:"Cold Shower Timer",     ds:"+1/sec",                b:50,    m:1.4, pc:0,  ps:1},
  {id:"gym",     ic:"🏋️",nm:"Gym Membership",        ds:"+4/sec",                b:250,   m:1.5, pc:0,  ps:4},
  {id:"skin",    ic:"🧴",nm:"Skincare Routine",      ds:"+12/sec glow up",       b:1200,  m:1.55,pc:0,  ps:12},
  {id:"rhino",   ic:"🔪",nm:"Rhinoplasty",           ds:"+40/sec",               b:6000,  m:1.6, pc:0,  ps:40},
  {id:"hgh",     ic:"💉",nm:"HGH Protocol",          ds:"+120/sec ascension",    b:25000, m:1.65,pc:0,  ps:120},
  {id:"model",   ic:"📸",nm:"Model Agency Contract", ds:"+500/sec",              b:120000,m:1.7, pc:0,  ps:500},
  {id:"god",     ic:"⚡",nm:"Genetic Recombination", ds:"+2000/sec final form",  b:800000,m:1.8, pc:0,  ps:2000},
];

// ============ RANKS ============
const RANKS = [
  {min:0,nm:"Subhuman",c:"#555"},{min:0.5,nm:"Normie",c:"#ff2e50"},{min:2,nm:"HTN",c:"#ff8800"},
  {min:3.5,nm:"Chadlite",c:"#ffd600"},{min:5,nm:"Chad",c:"#ffd600"},{min:6.5,nm:"Gigachad",c:"#00ffc8"},
  {min:8,nm:"Ascended",c:"#00aaff"},{min:9,nm:"Owen Tier",c:"#fff"},{min:9.8,nm:"Owen (Final Form)",c:"#fff"},
];

// ============ ACHIEVEMENTS ============
const ACH = [
  {id:"c10", ic:"👆",nm:"First Mews",       ds:"10 clicks",           ck:()=>S.clicks>=10},
  {id:"c100",ic:"👆",nm:"Mew Machine",      ds:"100 clicks",          ck:()=>S.clicks>=100},
  {id:"c1k", ic:"🤖",nm:"Mewbot 9000",     ds:"1,000 clicks",        ck:()=>S.clicks>=1000},
  {id:"p1k", ic:"💰",nm:"Stacking",         ds:"1K lifetime",         ck:()=>S.total>=1e3},
  {id:"p1m", ic:"🏆",nm:"Millionaire Mewer",ds:"1M lifetime",         ck:()=>S.total>=1e6},
  {id:"p1b", ic:"👑",nm:"Billionaire Mewer",ds:"1B lifetime",         ck:()=>S.total>=1e9},
  {id:"gym1",ic:"🏋️",nm:"Gymcel",           ds:"First gym pass",      ck:()=>own("gym")>=1},
  {id:"sr1", ic:"🔪",nm:"Under the Knife", ds:"First surgery",       ck:()=>own("rhino")>=1},
  {id:"md1", ic:"📸",nm:"Signed",           ds:"Model contract",      ck:()=>own("model")>=1},
  {id:"psl5",ic:"⭐",nm:"Chad Status",      ds:"PSL 5.0",             ck:()=>psl()>=5},
  {id:"foid",ic:"💅",nm:"Foid Approved",    ds:"PSL 7.0 — even the foids are mirin'",ck:()=>psl()>=7},
  {id:"psl9",ic:"🗿",nm:"Owen Mode",        ds:"PSL 9.0",             ck:()=>psl()>=9},
  {id:"stim",ic:"🌀",nm:"Stimmed Out",      ds:"Max the stim meter",  ck:()=>S.stim>=100},
  {id:"e67", ic:"🫳",nm:"Emote 67",         ds:"Trigger the rare emote 67", ck:()=>S.ach["e67"]},
];

// ============ RANDOM EVENTS ============
const EVENTS = [
  "Owen caught you lackin' with bad posture. Sit up.",
  "You accidentally mewed in class. Respect +10.",
  "Someone said 'nice jawline.' Keep going.",
  "Cold shower streak: 7 days. Ice doesn't phase you.",
  "Your gym crush noticed your gains.",
  "Bonesmashing results showing. Mirror is your friend now.",
  "You ate raw liver for breakfast. Ancestral gains.",
  "Owen approved your progress. PSL +0.01 spiritually.",
  "New PR at the gym. The grind pays.",
  "Sunlight exposure maxed. Vitamin D protocol complete.",
  "You stood in front of the mirror for 20 minutes. Passed.",
  "Mewing form check: tongue fully on palate. Perfect.",
];

// ============ STATE ============
let S = { pts:0, total:0, pc:1, ps:0, upg:{}, ach:{}, clicks:0, stim:0 };

// ============ HELPERS ============
const own = id => S.upg[id]||0;
const cost = u => Math.floor(u.b * Math.pow(u.m, own(u.id)));
function recalc() {
  S.pc=1; S.ps=0;
  for(const u of UPG){ const n=own(u.id); S.pc+=u.pc*n; S.ps+=u.ps*n; }
}
function psl() {
  if(S.total<=0)return 0;
  return Math.min(10, parseFloat((Math.log10(S.total+1)).toFixed(2)));
}
function getRank(p){ let r=RANKS[0]; for(const x of RANKS) if(p>=x.min)r=x; return r; }
function fmt(n){
  if(n>=1e15)return(n/1e15).toFixed(1)+"Q";
  if(n>=1e12)return(n/1e12).toFixed(1)+"T";
  if(n>=1e9)return(n/1e9).toFixed(1)+"B";
  if(n>=1e6)return(n/1e6).toFixed(1)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"K";
  return Math.floor(n);
}
function lerp(a,b,t){ return a+(b-a)*Math.min(1,Math.max(0,t)); }

// ============ SAVE / LOAD ============
const SAVE_KEY = "owen_lm_v3";
function save(){ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }
function load(){
  const r=localStorage.getItem(SAVE_KEY);
  if(r){ try{Object.assign(S,JSON.parse(r));recalc();}catch(e){} }
}

// ============ SCREEN SHAKE ============
function screenShake(level) {
  const el = document.getElementById("game");
  el.classList.remove("shake-1","shake-2","shake-3");
  void el.offsetWidth;
  el.classList.add("shake-"+level);
}

// ============ FLASH ============
function flash(color) {
  const el = document.getElementById("flash");
  el.style.background = color || "rgba(255,255,255,0.15)";
  el.classList.add("fire");
  setTimeout(()=>el.classList.remove("fire"), 80);
}

// ============ CHROMATIC ABERRATION ============
function chromatic() {
  const el = document.getElementById("chroma-wrap");
  el.classList.remove("aberr"); void el.offsetWidth;
  el.classList.add("aberr");
}

// ============ WOBBLE ============
function wobble() {
  const el = document.getElementById("click-area");
  el.classList.remove("wobble"); void el.offsetWidth;
  el.classList.add("wobble");
}

// ============ PARTICLES ============
function particles(x, y, count) {
  const colors = ["#ff2e50","#ffd600","#00ffc8","#ff00ff","#00aaff","#fff"];
  for(let i=0;i<count;i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const sz = 3 + Math.random()*5;
    p.style.width = sz+"px"; p.style.height = sz+"px";
    p.style.left = x+"px"; p.style.top = y+"px";
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    const angle = Math.random()*Math.PI*2;
    const dist = 30 + Math.random()*60;
    const dur = 0.3 + Math.random()*0.4;
    p.style.setProperty("--dx", Math.cos(angle)*dist+"px");
    p.style.setProperty("--dy", Math.sin(angle)*dist+"px");
    p.style.setProperty("--dur", dur+"s");
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), dur*1000);
  }
}

// ============ FLOAT TEXT ============
function floatText(x, y, text, color) {
  const ft = document.createElement("div");
  ft.className = "ft";
  ft.textContent = text;
  ft.style.color = color || "#ffd600";
  ft.style.left = (x + (Math.random()*30-15))+"px";
  ft.style.top = (y - 10)+"px";
  ft.style.setProperty("--r", (Math.random()*10-5)+"deg");
  document.body.appendChild(ft);
  setTimeout(()=>ft.remove(), 600);
}

// ============ LOG / TOAST ============
function log(m,hl){
  const el=document.getElementById("log"),s=document.createElement("span");
  if(hl)s.className="hl"; s.textContent=m; el.prepend(s);
  if(el.children.length>30)el.lastChild.remove();
}
let _tt;
function toast(m){
  const el=document.getElementById("toast"); el.textContent=m;
  el.classList.add("show"); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove("show"),2500);
}

// ============ STIM ============
function addStim(amount) {
  S.stim = Math.min(100, S.stim + amount);
  if(S.stim >= 100) { stimBurst(); S.stim = 0; }
}

function stimBurst() {
  screenShake(3);
  flash("rgba(255,0,255,0.25)");
  chromatic(); wobble();
  setTimeout(()=>{ flash("rgba(0,255,200,0.2)"); screenShake(2); }, 150);
  setTimeout(()=>{ flash("rgba(255,214,0,0.2)"); chromatic(); }, 300);

  const rect = document.getElementById("face").getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  particles(cx, cy, 40);

  const bonus = Math.floor(S.pc * 10);
  S.pts += bonus; S.total += bonus;
  floatText(cx, cy-30, "STIMMED! +" + fmt(bonus), "#ff00ff");
  toast("🌀 STIM BURST! +" + fmt(bonus) + " bonus!");
  log("STIM BURST — +" + fmt(bonus) + " bonus mew points!", true);

  // ~8% chance to trigger emote 67
  if(Math.random() < 0.08) {
    emote67Active = true;
    emote67Timer = 0;
    S.ach["e67"] = true;
    toast("🫳🫳 EMOTE 67 ACTIVATED 🫳🫳");
    log("RARE: Emote 67 triggered!", true);
    screenShake(3);
    flash("rgba(255,0,255,0.3)");
  }
}

const canvas = document.getElementById("face");
const ctx = canvas.getContext("2d");

function drawFace(t, time) {
  const W=200, H=280;
  ctx.clearRect(0,0,W,H);

  const si = typeof stimIntensity !== 'undefined' ? stimIntensity : 0;

  // normal breathing + stim shaking layered on top
  const breathe = Math.sin(time*2)*1.5 + si * Math.sin(time*35) * 8;
  const headTilt = Math.sin(time*0.7)*0.5 + si * Math.sin(time*20) * 12;
  const headShakeX = si * Math.sin(time*25) * 6;

  ctx.save();
  ctx.translate(W/2 + headShakeX, H/2 + breathe - 10);
  ctx.rotate(headTilt * Math.PI/180);

  // stim face scale throb
  if(si > 0.3) {
    const throb = 1 + Math.sin(time*18) * si * 0.06;
    ctx.scale(throb, throb);
  }

  // HEAD SHAPE
  const headW = lerp(42, 36, t);
  const headH = lerp(50, 56, t);
  const jawW = lerp(40, 32, t);
  const jawDrop = lerp(46, 52, t);
  const cheekbone = lerp(0, 6, t);

  const skinR = Math.floor(lerp(210, 230, t));
  const skinG = Math.floor(lerp(180, 195, t));
  const skinB = Math.floor(lerp(160, 165, t));
  ctx.fillStyle = `rgb(${skinR},${skinG},${skinB})`;

  ctx.beginPath();
  ctx.moveTo(0, -headH);
  ctx.quadraticCurveTo(headW*0.6, -headH, headW, -headH*0.3);
  ctx.quadraticCurveTo(headW + cheekbone, 0, jawW, jawDrop*0.6);
  const chinW = lerp(18, 10, t);
  const chinSharp = lerp(8, 2, t);
  ctx.quadraticCurveTo(jawW*0.8, jawDrop*0.85, chinW, jawDrop);
  ctx.quadraticCurveTo(chinSharp, jawDrop+lerp(4,8,t), 0, jawDrop+lerp(6,10,t));
  ctx.quadraticCurveTo(-chinSharp, jawDrop+lerp(4,8,t), -chinW, jawDrop);
  ctx.quadraticCurveTo(-jawW*0.8, jawDrop*0.85, -jawW, jawDrop*0.6);
  ctx.quadraticCurveTo(-headW - cheekbone, 0, -headW, -headH*0.3);
  ctx.quadraticCurveTo(-headW*0.6, -headH, 0, -headH);
  ctx.fill();

  // CHEEKBONE SHADOWS
  if(t > 0.3) {
    ctx.fillStyle = `rgba(0,0,0,${lerp(0, 0.08, (t-0.3)/0.7)})`;
    ctx.beginPath(); ctx.ellipse(22, 10, 10, 4, 0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-22, 10, 10, 4, -0.2, 0, Math.PI*2); ctx.fill();
  }

  // EYES — bug out during stim
  const eyeY = lerp(-4, -8, t);
  const eyeSpacing = lerp(16, 15, t);
  const eyeW = lerp(9, 11, t) + si * 4;           // eyes get HUGE
  const eyeH = lerp(7, 6, t) + si * 5;             // wider vertically too
  const eyeTilt = lerp(0, -0.12, t) + si * Math.sin(time*22) * 0.15;
  const browH = lerp(-13, -17, t) - si * 5;        // brows shoot up
  const browThick = lerp(2, 3, t) + si * 2;
  const browTilt = lerp(0, 0.15, t) + si * Math.sin(time*18) * 0.3;
  // stim eye jitter
  const eyeJitterX = si > 0.4 ? Math.sin(time*40) * si * 3 : 0;
  const eyeJitterY = si > 0.4 ? Math.cos(time*33) * si * 2 : 0;

  // brow ridge shadow
  ctx.fillStyle = `rgba(0,0,0,${lerp(0.03, 0.12, t)})`;
  for(let side of [-1,1]) {
    ctx.beginPath(); ctx.ellipse(side*eyeSpacing, eyeY-3, eyeW+2, lerp(4,6,t), 0, 0, Math.PI*2); ctx.fill();
  }

  for(let side of [-1,1]) {
    ctx.save();
    ctx.translate(side*eyeSpacing + eyeJitterX, eyeY + eyeJitterY);
    ctx.rotate(side * eyeTilt);

    ctx.fillStyle = "#f0ece8";
    ctx.beginPath(); ctx.ellipse(0, 0, eyeW, eyeH, 0, 0, Math.PI*2); ctx.fill();

    // stim: pupil darts around, dilates
    const pupilOffX = si > 0.3 ? Math.sin(time*30+side*2) * si * 3 : 0;
    const pupilOffY = si > 0.3 ? Math.cos(time*26+side) * si * 2 : 0;
    const pupilSize = lerp(2.5, 3, t) + si * 2; // dilated af

    const irisG = Math.floor(lerp(80, 140, t));
    const irisB = Math.floor(lerp(60, 180, t));
    ctx.fillStyle = si > 0.6 ? `rgb(${Math.floor(200+Math.sin(time*20)*55)},${irisG},${irisB})` : `rgb(40,${irisG},${irisB})`;
    ctx.beginPath(); ctx.arc(pupilOffX, pupilOffY, lerp(5, 5.5, t) + si*1.5, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = "#111";
    ctx.beginPath(); ctx.arc(pupilOffX, pupilOffY, pupilSize, 0, Math.PI*2); ctx.fill();

    // bloodshot veins at high stim
    if(si > 0.5) {
      ctx.strokeStyle = `rgba(255,30,30,${si*0.5})`;
      ctx.lineWidth = 0.5;
      for(let v=0;v<4;v++) {
        const a = v*Math.PI/2 + time*2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*3, Math.sin(a)*3);
        ctx.lineTo(Math.cos(a)*(eyeW-1), Math.sin(a)*(eyeH-1));
        ctx.stroke();
      }
    }

    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.beginPath(); ctx.arc(pupilOffX-2, pupilOffY-2, 1.5, 0, Math.PI*2); ctx.fill();

    ctx.strokeStyle = `rgba(40,30,20,${lerp(0.4,0.8,t)})`;
    ctx.lineWidth = lerp(1, 1.5, t);
    ctx.beginPath(); ctx.ellipse(0, -1, eyeW, eyeH*0.7, 0, Math.PI, Math.PI*2); ctx.stroke();

    ctx.restore();

    // EYEBROW
    ctx.save();
    ctx.translate(side*eyeSpacing, browH);
    ctx.rotate(side * browTilt);
    ctx.fillStyle = `rgba(40,30,20,${lerp(0.5,0.9,t)})`;
    ctx.beginPath(); ctx.ellipse(0, 0, eyeW+2, browThick, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // NOSE
  const noseW = lerp(8, 5, t);
  const noseH = lerp(14, 16, t);
  const noseY = lerp(8, 6, t);
  ctx.strokeStyle = `rgba(60,40,30,${lerp(0.2,0.35,t)})`;
  ctx.lineWidth = lerp(1.5, 1, t);
  ctx.beginPath(); ctx.moveTo(0, noseY); ctx.lineTo(0, noseY+noseH); ctx.stroke();
  ctx.beginPath();
  ctx.arc(-noseW*0.5, noseY+noseH, noseW*0.3, 0, Math.PI*2);
  ctx.arc(noseW*0.5, noseY+noseH, noseW*0.3, 0, Math.PI*2);
  ctx.stroke();

  // MOUTH — goes unhinged during stim
  const mouthY = lerp(32, 34, t) + si * 3;
  const mouthW = lerp(12, 10, t) + si * 6;
  const mouthOpen = si * 12; // how far mouth opens
  const lipFullness = lerp(2, 3, t);
  const mouthVibX = si > 0.5 ? Math.sin(time*28) * si * 2 : 0;

  if(si > 0.3) {
    // OPEN MOUTH - dark cavity
    ctx.fillStyle = `rgb(${Math.floor(40-si*30)},${Math.floor(15-si*10)},${Math.floor(20-si*15)})`;
    ctx.beginPath();
    ctx.ellipse(mouthVibX, mouthY + mouthOpen*0.3, mouthW, lipFullness + mouthOpen, 0, 0, Math.PI*2);
    ctx.fill();

    // teeth at high stim
    if(si > 0.5) {
      ctx.fillStyle = "#f0ece0";
      const teethCount = 6;
      for(let i=0;i<teethCount;i++) {
        const tx = mouthVibX + lerp(-mouthW+3, mouthW-3, i/(teethCount-1));
        // top teeth
        ctx.fillRect(tx-1.5, mouthY - mouthOpen*0.1, 3, 3 + si*2);
        // bottom teeth
        ctx.fillRect(tx-1.5, mouthY + mouthOpen*0.5 - si*2, 3, 3 + si*1.5);
      }
    }
  }

  // lips
  ctx.fillStyle = `rgb(${Math.floor(lerp(180,190,t))},${Math.floor(lerp(110,120,t))},${Math.floor(lerp(100,110,t))})`;
  ctx.beginPath(); ctx.ellipse(mouthVibX, mouthY - mouthOpen*0.2, mouthW, lipFullness, 0, Math.PI, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mouthVibX, mouthY + mouthOpen*0.6, mouthW, lipFullness, 0, 0, Math.PI); ctx.fill();

  if(t > 0.5 && si < 0.3) {
    ctx.strokeStyle = `rgba(140,80,70,${lerp(0,0.4,(t-0.5)*2)})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(mouthW+2, mouthY-1, 3, 0.5, 1.2); ctx.stroke();
  }

  // HAIR
  const hairColor = `rgb(${Math.floor(lerp(50,30,t))},${Math.floor(lerp(35,22,t))},${Math.floor(lerp(25,18,t))})`;
  ctx.fillStyle = hairColor;
  ctx.beginPath();
  ctx.moveTo(-headW-2, -headH*0.25);
  ctx.quadraticCurveTo(-headW*0.8, -headH-lerp(8,18,t), 0, -headH-lerp(6,16,t));
  ctx.quadraticCurveTo(headW*0.8, -headH-lerp(8,18,t), headW+2, -headH*0.25);
  ctx.quadraticCurveTo(headW, -headH, 0, -headH);
  ctx.quadraticCurveTo(-headW, -headH, -headW-2, -headH*0.25);
  ctx.fill();
  if(t > 0.3) {
    ctx.fillStyle = hairColor;
    for(let i=-3;i<=3;i++) {
      const hx = i*7, hy = -headH - lerp(4,14,t) + Math.sin(i+time*2)*2;
      ctx.beginPath(); ctx.ellipse(hx, hy, 6, lerp(3,6,t), i*0.1, 0, Math.PI*2); ctx.fill();
    }
  }

  // EARS
  ctx.fillStyle = `rgb(${skinR-10},${skinG-10},${skinB-10})`;
  for(let side of [-1,1]) {
    ctx.beginPath(); ctx.ellipse(side*(headW+3), -2, 4, 7, side*0.2, 0, Math.PI*2); ctx.fill();
  }

  // NECK
  const neckW = lerp(14, 16, t);
  ctx.fillStyle = `rgb(${skinR-5},${skinG-5},${skinB-5})`;
  ctx.fillRect(-neckW, jawDrop+lerp(6,10,t)-2, neckW*2, 30);
  if(t > 0.6) {
    ctx.strokeStyle = `rgba(0,0,0,${lerp(0,0.08,(t-0.6)*2.5)})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-6, jawDrop+12); ctx.lineTo(-10, jawDrop+30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6, jawDrop+12); ctx.lineTo(10, jawDrop+30); ctx.stroke();
  }

  ctx.restore();

  // STIM FACE REDDENING — goes red/purple at high stim
  if(si > 0.3) {
    ctx.save();
    ctx.globalCompositeOperation = "multiply";
    const redIntensity = (si - 0.3) / 0.7;
    ctx.fillStyle = `rgba(255,${Math.floor(80-redIntensity*60)},${Math.floor(80-redIntensity*70)},${redIntensity*0.35})`;
    ctx.beginPath();
    ctx.ellipse(W/2, H/2 - 10, 50, 60, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalCompositeOperation = "source-over";
    ctx.restore();
  }

  // SWEAT DROPS at high stim
  if(si > 0.5) {
    ctx.fillStyle = `rgba(120,180,255,${si*0.6})`;
    const sweatCount = Math.floor(si * 5);
    for(let i=0;i<sweatCount;i++) {
      const sx = W/2 + Math.sin(time*3+i*7)*25 + (i%2?15:-15);
      const sy = H/2 - 25 + ((time*40 + i*50) % 60);
      ctx.beginPath();
      ctx.ellipse(sx, sy, 1.5, 2.5, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // GLITCH LINES during extreme stim
  if(si > 0.7) {
    const glitchCount = Math.floor((si-0.7)*20);
    for(let i=0;i<glitchCount;i++) {
      const gy = Math.random() * H;
      const gw = 20 + Math.random() * 60;
      const gx = W/2 - gw/2 + (Math.random()-0.5)*40;
      ctx.fillStyle = `rgba(${Math.random()>0.5?'255,0,100':'0,255,200'},${0.1+Math.random()*0.15})`;
      ctx.fillRect(gx, gy, gw, 1 + Math.random()*2);
    }
  }

  // GLOW AURA
  if(t > 0.7) {
    const glowAlpha = lerp(0, 0.15, (t-0.7)/0.3);
    const grad = ctx.createRadialGradient(W/2, H/2, 30, W/2, H/2, 110);
    grad.addColorStop(0, `rgba(255,214,0,${glowAlpha})`);
    grad.addColorStop(1, "rgba(255,214,0,0)");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);
  }
}

// ============ STIMMING HANDS ============
// stimIntensity: 0-1, time: continuous, doingEmote67: bool
let stimIntensity = 0;
let emote67Timer = 0;
let emote67Active = false;

function drawStimHands(time) {
  const W = 200, H = 240;
  if(stimIntensity <= 0.01 && !emote67Active) return;

  ctx.save();

  const skinR = 220, skinG = 190, skinB = 165;
  const handColor = `rgb(${skinR},${skinG},${skinB})`;

  if(emote67Active) {
    // === EMOTE 67: hands come together, fingers spread, wiggle ===
    const ep = emote67Timer; // 0 to 1 progress
    const baseY = H * 0.75;

    for(let side of [-1, 1]) {
      ctx.save();
      // hands move from sides to center
      const handX = lerp(side * 90, side * 25, Math.min(1, ep * 2));
      const handY = lerp(baseY + 20, baseY - 10, Math.min(1, ep * 2));
      // wiggle once centered
      const wiggle = ep > 0.4 ? Math.sin(time * 25) * 8 * (1 - Math.abs(ep - 0.7) * 2) : 0;
      const fingerSpread = ep > 0.3 ? lerp(0, 1, (ep - 0.3) * 3) : 0;

      ctx.translate(W/2 + handX + wiggle, handY);
      ctx.rotate(side * lerp(0.3, -0.1, Math.min(1, ep * 2)));

      // palm
      ctx.fillStyle = handColor;
      ctx.beginPath();
      ctx.ellipse(0, 0, 10, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      // fingers — spread out during emote
      for(let f = 0; f < 5; f++) {
        const baseAngle = lerp(-0.5, 0.5, f / 4) * side;
        const spreadAngle = baseAngle * (1 + fingerSpread * 1.5);
        const fingerLen = f === 2 ? 14 : (f === 1 || f === 3) ? 12 : 9;
        const fWiggle = ep > 0.4 ? Math.sin(time * 20 + f * 1.5) * 3 : 0;

        ctx.save();
        ctx.rotate(spreadAngle + fWiggle * 0.05);
        ctx.fillStyle = handColor;
        ctx.beginPath();
        ctx.ellipse(0, -12 - fingerLen/2, 2.5, fingerLen/2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    // 67 text flash
    if(ep > 0.3 && ep < 0.85) {
      ctx.save();
      ctx.font = "bold 16px 'Bebas Neue', sans-serif";
      ctx.textAlign = "center";
      ctx.fillStyle = `rgba(255,0,255,${Math.sin(time*15)*0.3+0.7})`;
      ctx.fillText("67", W/2, H * 0.55);
      ctx.restore();
    }

  } else {
    // === NORMAL STIMMING: hand flapping ===
    const intensity = stimIntensity;
    const baseY = H * 0.78;
    const flapSpeed = lerp(8, 22, intensity);
    const flapAmount = lerp(2, 18, intensity);
    const armVisible = Math.min(1, intensity * 3); // fade in

    for(let side of [-1, 1]) {
      ctx.save();
      ctx.globalAlpha = armVisible;

      const handX = W/2 + side * 55;
      const flapAngle = Math.sin(time * flapSpeed + side * 0.5) * flapAmount;
      const handY = baseY + Math.abs(flapAngle) * 0.3;

      ctx.translate(handX, handY);
      ctx.rotate((flapAngle * Math.PI / 180) * side * -1);

      // wrist/arm stub
      ctx.fillStyle = handColor;
      ctx.beginPath();
      ctx.ellipse(0, 12, 5, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      // palm
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      // fingers — slightly spread, vibrating at high intensity
      for(let f = 0; f < 5; f++) {
        const angle = lerp(-0.4, 0.4, f / 4);
        const fingerLen = f === 2 ? 12 : (f === 1 || f === 3) ? 10 : 7;
        const vibrate = intensity > 0.5 ? Math.sin(time * 30 + f * 2) * lerp(0, 2, (intensity - 0.5) * 2) : 0;

        ctx.save();
        ctx.rotate(angle);
        ctx.translate(vibrate, 0);
        ctx.fillStyle = handColor;
        ctx.beginPath();
        ctx.ellipse(0, -10 - fingerLen/2, 2, fingerLen/2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      ctx.restore();
    }
  }

  ctx.restore();
}

let micReady = false;
birdImg.onload = () => { micReady = true; };

let micInited = false;
function initMic() {
  if(micInited) return;
  micInited = true;
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const audioCtx = new AudioContext();
    const src = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.5;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    function poll() {
      analyser.getByteFrequencyData(data);
      let sum = 0;
      for(let i = 0; i < data.length; i++) sum += data[i];
      micVolume = sum / data.length / 255;
      micSmooth = micSmooth * 0.7 + micVolume * 0.3;
      micActive = micSmooth > MIC_THRESHOLD;
      requestAnimationFrame(poll);
    }
    poll();
    log("MIC ON — talk to trigger bird mode", true);
    toast("🎤 Mic connected! Talk to activate bird mode");
  }).catch(e => {
    micInited = false; // allow retry
    log("Mic denied — will retry on next click", false);
  });
}

// auto-request mic on first user interaction (browser requires gesture)
function tryMicOnce() {
  initMic();
  document.removeEventListener("click", tryMicOnce);
  document.removeEventListener("touchstart", tryMicOnce);
}
document.addEventListener("click", tryMicOnce);
document.addEventListener("touchstart", tryMicOnce);

function drawBird(time) {
  if(!micReady) return;
  const W = 200, H = 280;
  ctx.clearRect(0, 0, W, H);

  // shake based on volume
  const shakeX = (Math.random() - 0.5) * micSmooth * 60;
  const shakeY = (Math.random() - 0.5) * micSmooth * 60;
  const scale = 1 + micSmooth * 0.15;
  const rot = Math.sin(time * 15) * micSmooth * 0.1;

  ctx.save();
  ctx.translate(W/2 + shakeX, H/2 + shakeY);
  ctx.rotate(rot);
  ctx.scale(scale, scale);

  // draw bird centered
  const aspect = birdImg.width / birdImg.height;
  let drawW = 180, drawH = drawW / aspect;
  if(drawH > 240) { drawH = 240; drawW = drawH * aspect; }
  ctx.drawImage(birdImg, -drawW/2, -drawH/2, drawW, drawH);

  // red overlay pulse when loud
  if(micSmooth > 0.05) {
    ctx.globalAlpha = micSmooth * 0.4;
    ctx.fillStyle = "#ff0000";
    ctx.fillRect(-drawW/2, -drawH/2, drawW, drawH);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // chromatic + flash effects when loud
  if(micSmooth > 0.08) {
    // scanline glitch
    for(let i = 0; i < 3; i++) {
      const y = Math.random() * H;
      const h = 1 + Math.random() * 3;
      ctx.fillStyle = "rgba(255,0,255," + (micSmooth * 0.3) + ")";
      ctx.fillRect(Math.random() * 20 - 10, y, W, h);
    }
  }

  // "LISTENING" text
  ctx.save();
  ctx.font = "bold 14px 'Bebas Neue', sans-serif";
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(255,46,80," + (0.5 + Math.sin(time * 8) * 0.5) + ")";
  ctx.fillText("🎤 LISTENING", W/2, H - 8);
  ctx.restore();
}

document.getElementById("click-area").addEventListener("click", (e) => {
  S.pts += S.pc; S.total += S.pc; S.clicks++;

  const p = psl();
  const intensity = Math.min(3, Math.floor(p/3) + 1);
  wobble(); screenShake(intensity);
  if(p >= 2) flash("rgba(255,255,255,0.08)");
  if(p >= 4) chromatic();
  if(p >= 6) flash(`rgba(${Math.random()>0.5?'255,46,80':'0,255,200'},0.12)`);

  particles(e.clientX, e.clientY, Math.min(15, 2 + Math.floor(p * 1.2)));
  const colors = ["#ffd600","#ff2e50","#00ffc8","#ff00ff","#00aaff"];
  floatText(e.clientX, e.clientY, "+"+fmt(S.pc), colors[Math.floor(Math.random()*colors.length)]);

  addStim(lerp(2, 0.5, p/10));
  checkAch(); render();
});

// ============ BUY ============
function buy(id) {
  const u = UPG.find(u=>u.id===id);
  const c = cost(u);
  if(S.pts < c) return;
  S.pts -= c;
  S.upg[id] = (S.upg[id]||0)+1;
  recalc();
  log("Purchased "+u.nm+" (x"+own(u.id)+")");
  screenShake(1); flash("rgba(255,214,0,0.1)");
  checkAch(); render();
}

// ============ ACHIEVEMENTS ============
function checkAch() {
  for(const a of ACH) {
    if(!S.ach[a.id] && a.ck()) {
      S.ach[a.id] = true;
      toast("🏆 "+a.nm+" — "+a.ds);
      log("Achievement: "+a.nm, true);
      screenShake(2); flash("rgba(255,214,0,0.2)"); chromatic();
    }
  }
}

// ============ RENDER ============
function render() {
  document.getElementById("s-pts").textContent = fmt(S.pts);
  document.getElementById("s-pc").textContent = fmt(S.pc);
  document.getElementById("s-ps").textContent = fmt(S.ps);
  document.getElementById("s-total").textContent = fmt(S.total);

  const p = psl(), r = getRank(p);
  document.getElementById("psl-fill").style.width = Math.min(100,p/10*100)+"%";
  document.getElementById("psl-num").textContent = p.toFixed(1)+" / 10.0";
  document.getElementById("psl-in").textContent = p.toFixed(1);
  const rl = document.getElementById("rank");
  rl.textContent = r.nm; rl.style.color = r.c;

  document.getElementById("stim-fill").style.width = S.stim+"%";
  document.getElementById("stim-pct").textContent = Math.floor(S.stim)+"%";
  const sf = document.getElementById("stim-fill");
  if(S.stim >= 80) sf.classList.add("maxed"); else sf.classList.remove("maxed");

  // upgrades
  const ul = document.getElementById("ul");
  ul.innerHTML = "";
  for(const u of UPG) {
    const c=cost(u), can=S.pts>=c;
    const d=document.createElement("div");
    d.className="ug"+(can?"":" lk");
    d.onclick=()=>buy(u.id);
    d.innerHTML='<div class="ic">'+u.ic+'</div><div class="inf"><div class="nm">'+u.nm+'</div><div class="ds">'+u.ds+'</div></div><div class="rt"><div class="co">'+fmt(c)+'</div><div class="ow">x'+own(u.id)+'</div></div>';
    ul.appendChild(d);
  }

  // achievements
  const ag = document.getElementById("ag");
  ag.innerHTML="";
  for(const a of ACH) {
    const d=document.createElement("div");
    d.className="ac"+(S.ach[a.id]?" un":"");
    d.innerHTML=a.ic+'<div class="tt"><b>'+a.nm+'</b><br>'+a.ds+'</div>';
    ag.appendChild(d);
  }
}

// ============ ANIMATION LOOP ============
function animate(ts) {
  const time = ts / 1000;

  if(typeof micActive !== 'undefined' && micActive) {
    // MIC MODE — bird takes over
    drawBird(time);
    // trigger effects when loud
    if(micSmooth > 0.06) {
      screenShake(Math.min(3, Math.floor(micSmooth * 20)));
      if(Math.random() < micSmooth * 2) chromatic();
      if(Math.random() < micSmooth) flash(`rgba(255,46,80,${micSmooth*0.3})`);
    }
  } else {
    // NORMAL MODE
    drawFace(psl() / 10, time);
    stimIntensity = lerp(stimIntensity, S.stim / 100, 0.1);

    if(emote67Active) {
      emote67Timer += 0.012;
      if(emote67Timer >= 1) { emote67Active = false; emote67Timer = 0; }
    }

    drawStimHands(time);
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ============ PASSIVE TICK ============
setInterval(()=>{
  if(S.ps>0){
    const g=S.ps/10;
    S.pts+=g; S.total+=g;
    addStim(0.05);
    checkAch(); render();
  }
}, 100);

// ============ STIM DECAY ============
setInterval(()=>{
  if(S.stim > 0) {
    S.stim = Math.max(0, S.stim - 0.3);
    document.getElementById("stim-fill").style.width = S.stim+"%";
    document.getElementById("stim-pct").textContent = Math.floor(S.stim)+"%";
  }
}, 200);

// ============ RANDOM EVENTS ============
setInterval(()=>{
  if(Math.random()<0.15 && S.total>50){
    const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
    log("EVENT: "+ev, true);
    toast("📢 "+ev);
    screenShake(1);
  }
}, 18000);

// ============ INIT ============
load(); render();
setInterval(save, 10000);
window.addEventListener("beforeunload", save);
</script>
</body></html>
